services:
    db:
        image: postgres:15-alpine
        restart: always
        ports:
            - "127.0.0.1:5432:5432"
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
            TZ: Europe/Moscow
            PGTZ: Europe/Moscow
        volumes: [ pgdata: /var/lib/postgresql/data ]
        newtworks: [ app-network ]
    redis:
        image: redis:alpine
        restart: always
        command: [ "redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}" ]
        ports:
            - "127.0.0.1:6379:6379"
        environment:
            TZ: Europe/Moscow
        volumes: [ redisdata: /data ]
        networks: [ app-network ]
    bot:
        image: ${REGISTRY}/${IMAGE_NAME}:latest
        restart: always
        env_file: .env
        environment:
            TZ: Europe/Moscow
        depends_on: [ db, redis ]
        networks: [ app-network ]
    nginx:
        image: nginx:alpine
        restart: always
        ports: [ "80:80", "443:443" ]
        enviroment:
            TZ: Europe/Moscow
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
            - ./uploads:/app/public/uploads:ro
            - ./certbot/conf:/etc/letsencrypt
            - ./certbot/www:/var/www/certbot
        depends_on: [ bot ]
        networks: [ app-network ]
    certbot:
        image: certbot/certbot
        environment:
            TZ: Europe/Moscow
        volumes:
            - ./certbot/conf:/etc/letsencrypt
            - ./certbot/www:/var/www/certbot
        networks: [ app-network ]

networks:
    app-network: { driver: bridge }
volumes:
    pgdata:
    redisdata: